spring:
  application:
    name: catalog-pricing-service

  datasource:
    url: jdbc:postgresql://localhost:5432/catalog_pricing_service
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true

  flyway:
    enabled: false
    locations: classpath:db/migration
